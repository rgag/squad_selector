game:
  duration: 70
  formation: "3-5-2"
  sub_windows:
    min: 2
    max: 6
  num_plans: 5
  constraints:
    # List pairs of players where at least one must always be on the pitch.
    # Remove or leave empty if not needed.
    never_bench_together:
      - [Harry, Louisa]
      - [Charlotte, Daisy]
      - [Jess, Izzy]

